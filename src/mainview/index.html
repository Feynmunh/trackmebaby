<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#ffffff" />
  <title>trackmebaby</title>
  <link rel="icon" type="image/png" href="/assets/trackmebaby.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Jura:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <script>
    (() => {
      try {
        const theme = localStorage.getItem('trackmebaby-theme') || 'system';
        let isDark = theme === 'dark';
        if (theme === 'system') {
          isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        }
        if (isDark) document.documentElement.classList.add('dark');
        const themeColorMeta = document.querySelector('meta[name="theme-color"]');
        if (themeColorMeta) themeColorMeta.setAttribute('content', isDark ? '#000000' : '#ffffff');
      } catch (_e) { }
    })();
  </script>
</head>

<body class="bg-app-bg text-app-text-main antialiased overflow-hidden font-sans">
  <div id="root" class="h-screen w-screen overflow-hidden"></div>
  <script type="module" src="/main.tsx"></script>
</body>

</html>
