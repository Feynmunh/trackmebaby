name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.1.0). If empty, version from package.json is used.'
        required: false
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: macos-latest
            platform: macos
            arch: arm64
          - os: windows-latest
            platform: win
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pin version to match CI for reproducibility
          bun-version: 1.3.x

      - name: Install Linux Build Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config

      - name: Clean build artifacts
        shell: bash
        run: |
          rm -rf build/
          rm -rf artifacts/

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Production App
        run: bun run build:prod

      - name: Package Artifact (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          # Package the .app folder into a tarball
          # Discover the actual path to handle potential naming variations
          APP_PATH=$(find build/stable-macos-* -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Could not find .app bundle in build directory"
            exit 1
          fi
          APP_DIR=$(dirname "$APP_PATH")
          APP_NAME=$(basename "$APP_PATH")
          cd "$APP_DIR"
          tar -czf ../../trackmebaby-macos-arm64.tar.gz "$APP_NAME"

      - name: Package Artifact (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          # Find the setup tarball created by Electrobun
          SETUP_PATH=$(find build/stable-linux-* -name "*-Setup.tar.gz" | head -n 1)
          if [ -z "$SETUP_PATH" ]; then
            echo "Error: Could not find Linux setup tarball"
            exit 1
          fi
          cp "$SETUP_PATH" ./trackmebaby-linux-x64-installer.tar.gz

      - name: Package Artifact (Windows)
        if: matrix.platform == 'win'
        shell: bash # Use bash on windows runner for consistent find usage
        run: |
          # Find the setup exe created by Electrobun
          SETUP_PATH=$(find build/stable-win-* -name "*-Setup.exe" | head -n 1)
          if [ -z "$SETUP_PATH" ]; then
            echo "Error: Could not find Windows setup exe"
            exit 1
          fi
          cp "$SETUP_PATH" ./trackmebaby-windows-setup.exe

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trackmebaby-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            trackmebaby-macos-arm64.tar.gz
            trackmebaby-linux-x64-installer.tar.gz
            trackmebaby-windows-setup.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        shell: bash
        run: |
          # Handle tag from push or manual input
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.tag }}" != "" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            # Fallback to package.json version if no tag provided
            TAG="v$(cat package.json | jq -r .version)"
          fi
          
          # Remove 'v' prefix for changelog reader
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract changelog
        id: changelog_reader
        uses: mindsers/changelog-reader-action@v2
        with:
          version: ${{ steps.get_version.outputs.version }}
          path: ./CHANGELOG.md

      - name: Get title from changelog
        id: get_title
        shell: bash
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          # Extract title part after the date
          TITLE=$(grep "^## \[$VERSION\]" CHANGELOG.md | awk -F ' - ' '{print $3}')
          echo "title=$TITLE" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: ${{ steps.get_version.outputs.tag }}${{ steps.get_title.outputs.title != '' && format(' - {0}', steps.get_title.outputs.title) || '' }}
          body: ${{ steps.changelog_reader.outputs.changes }}
          files: dist/*
          generate_release_notes: false
          prerelease: ${{ contains(steps.get_version.outputs.tag, '-alpha') || contains(steps.get_version.outputs.tag, '-beta') || contains(steps.get_version.outputs.tag, '-rc') }}
