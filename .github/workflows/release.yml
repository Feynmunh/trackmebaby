name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.1.0). If empty, version from package.json is used.'
        required: false
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: macos-latest
            platform: macos
            arch: arm64
          - os: windows-latest
            platform: win
            arch: x64

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Normalize tag prefix early via expression so checkout succeeds even if 'v' is omitted in manual input
          ref: >-
            ${{ 
              (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '') && 
              (startsWith(github.event.inputs.tag, 'v') && github.event.inputs.tag || format('v{0}', github.event.inputs.tag)) || 
              github.ref 
            }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - name: Install Linux Build Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config

      - name: Clean build artifacts
        shell: bash
        run: |
          rm -rf build/
          rm -rf artifacts/

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Production App
        run: bun run build:prod

      - name: Package Artifact (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          # Package the .app folder into a tarball
          APP_PATH=$(find build -path '*/stable-macos-*' -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "::error ::Could not find .app bundle"
            exit 1
          fi
          # Use absolute paths and -C flag for robust packaging regardless of folder depth
          APP_DIR=$(dirname "$APP_PATH")
          APP_NAME=$(basename "$APP_PATH")
          tar -C "$APP_DIR" -czf "$GITHUB_WORKSPACE/trackmebaby-macos-${{ matrix.arch }}.tar.gz" "$APP_NAME"

      - name: Package Artifact (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          SETUP_PATH=$(find build -path '*/stable-linux-*' -name "*-Setup.tar.gz" | head -n 1)
          if [ -z "$SETUP_PATH" ]; then
            echo "::error ::Could not find Linux setup tarball"
            exit 1
          fi
          cp "$SETUP_PATH" "$GITHUB_WORKSPACE/trackmebaby-linux-${{ matrix.arch }}-installer.tar.gz"

      - name: Package Artifact (Windows)
        if: matrix.platform == 'win'
        shell: bash
        run: |
          SETUP_PATH=$(find build -path '*/stable-win-*' -name "*-Setup.exe" | head -n 1)
          if [ -z "$SETUP_PATH" ]; then
            echo "::error ::Could not find Windows setup exe"
            exit 1
          fi
          # Align naming with matrix platform (win) as recommended in review
          cp "$SETUP_PATH" "$GITHUB_WORKSPACE/trackmebaby-win-${{ matrix.arch }}-setup.exe"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trackmebaby-${{ matrix.platform }}-${{ matrix.arch }}
          # Path uses a platform-specific prefix to only upload the file created by this runner
          path: trackmebaby-${{ matrix.platform }}-${{ matrix.arch }}*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: >-
            ${{ 
              (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '') && 
              (startsWith(github.event.inputs.tag, 'v') && github.event.inputs.tag || format('v{0}', github.event.inputs.tag)) || 
              github.ref 
            }}

      - name: Get version and normalize tag
        id: get_version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.tag }}" != "" ]]; then
            INPUT_TAG="${{ github.event.inputs.tag }}"
            [[ ! $INPUT_TAG == v* ]] && TAG="v$INPUT_TAG" || TAG="$INPUT_TAG"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            # Extract from package.json using node (no jq dep). Fixed quoting for bash safety as recommended.
            TAG="v$(node -p 'require("./package.json").version')"
          fi
          
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract changelog
        id: changelog_reader
        uses: mindsers/changelog-reader-action@v2
        with:
          version: ${{ steps.get_version.outputs.version }}
          path: ./CHANGELOG.md

      - name: Get title from changelog
        id: get_title
        shell: bash
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          # Precise Fix: Use awk for surgical string comparison instead of regex matching.
          # This prevents false positives and dots-as-regex metacharacter issues.
          TITLE=$(awk -F ' - ' -v ver="$VERSION" '$1 == "## [" ver "]" {print $3; exit}' CHANGELOG.md)
          if [ -z "$TITLE" ]; then
            echo "::warning ::No title found in CHANGELOG.md for version $VERSION"
          fi
          echo "title=$TITLE" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: ${{ steps.get_version.outputs.tag }}${{ steps.get_title.outputs.title != '' && format(' - {0}', steps.get_title.outputs.title) || '' }}
          body: ${{ steps.changelog_reader.outputs.changes }}
          files: dist/*
          generate_release_notes: false
          prerelease: ${{ contains(steps.get_version.outputs.tag, '-alpha') || contains(steps.get_version.outputs.tag, '-beta') || contains(steps.get_version.outputs.tag, '-rc') }}
