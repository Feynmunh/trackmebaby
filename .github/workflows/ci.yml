name: CI

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main

env:
    CI: true

jobs:
    ci:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.x

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Lint
              run: bun run lint

            - name: Typecheck
              run: bun run typecheck

            - name: Test
              run: bun test

            - name: Build
              run: bun run build
